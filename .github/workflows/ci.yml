# Lint + test TypeScript app; Rust: workspace rustfmt, brain (Tauri) clippy + lib tests.
# Ripmail crate: see ripmail-ci.yml.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Tauri (`brain` / desktop) links GTK + WebKit on Linux; runners are minimal without these.
      - name: Install Linux deps for Tauri (brain)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      # Tauri build script validates externalBin paths at compile time; download the Linux sidecar.
      - name: Download cloudflared sidecar (Linux)
        run: node scripts/setup-sidecars.mjs

      # Tauri build script also asserts that resource directories exist; create the stub so
      # cargo clippy/test pass without a full desktop:bundle-server run.
      - name: Create server-bundle stub (Linux CI)
        run: mkdir -p desktop/resources/server-bundle

      - name: Full CI (JS + brain Rust)
        run: npm run ci

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => m.pct.toFixed(1) + '%';
              console.log('## Test Coverage\n');
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Lines | ' + fmt(c.lines) + ' |');
              console.log('| Statements | ' + fmt(c.statements) + ' |');
              console.log('| Functions | ' + fmt(c.functions) + ' |');
              console.log('| Branches | ' + fmt(c.branches) + ' |');
            " >> $GITHUB_STEP_SUMMARY
          fi
