# Parallel CI: Node app, Docker image.
# Desktop (Tauri) build is manual-only.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_desktop:
        description: 'Build desktop (Tauri) crate'
        type: boolean
        default: false

jobs:
  node:
    name: Node (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, test
        run: pnpm run ci

      - name: Enron mail corpus Vitest E2E (skips without seeded ./data corpus)
        run: pnpm run e2e:enron

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => m.pct.toFixed(1) + '%';
              console.log('## Test Coverage\n');
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Lines | ' + fmt(c.lines) + ' |');
              console.log('| Statements | ' + fmt(c.statements) + ' |');
              console.log('| Functions | ' + fmt(c.functions) + ' |');
              console.log('| Branches | ' + fmt(c.branches) + ' |');
            " >> $GITHUB_STEP_SUMMARY
          fi

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t brain-app:ci .

  desktop:
    name: Desktop (Tauri crate)
    if: github.event_name == 'workflow_dispatch' && inputs.build_desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Download cloudflared sidecar
        run: node scripts/setup-sidecars.mjs

      - name: Create server-bundle stub
        run: mkdir -p desktop/resources/server-bundle

      - name: fmt, clippy, test
        run: |
          cargo fmt -p brain -- --check
          cargo clippy -p brain -- -D warnings
          cargo test -p brain --lib
