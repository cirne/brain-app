# Build the Linux server image (Dockerfile) and push to DigitalOcean Container Registry on main.
# Image path matches scripts/docker-publish-do.sh: registry.digitalocean.com/braintunnel/brain-app

name: Docker image (DO registry)

on:
  push:
    branches: [main]

env:
  REGISTRY: registry.digitalocean.com
  IMAGE: braintunnel/brain-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install ripmail link deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Prebuild ripmail (.docker/linux-ripmail/ripmail)
        env:
          DOCKER_PLATFORM: linux/amd64
        run: npm run docker:ripmail:build

      - name: Image version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
