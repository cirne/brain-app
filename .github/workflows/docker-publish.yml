# Build and push to GitHub Container Registry on push to main.
# Image: ghcr.io/<owner>/<repo>:latest (and :main)
# Pull: docker pull ghcr.io/<owner>/<repo>:latest
# Packages may be private by default; set visibility under repo → Packages.

name: Docker publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:main
