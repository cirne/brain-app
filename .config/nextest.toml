# cargo-nextest — https://nexte.st/docs/configuration/
# Used for the ripmail crate only (`cargo nextest run -p ripmail`).
# Schedules each #[test] as its own process and runs many of them concurrently,
# unlike `cargo test` which runs each integration-test binary serially.

[store]
dir = "target/nextest"

[profile.default]
# Concurrent test jobs (each test is a separate process under nextest).
test-threads = "num-cpus"

[profile.ci]
inherits = "default"
fail-fast = false
