# DigitalOcean droplet — staging (braintunnel.ai). Pull image from Container Registry (no local build).
# Registry login on the host: doctl registry login — see docs/digitalocean.md
#
# Usage (same directory as `.env` for secrets / API keys only):
#   docker compose -f docker-compose.do.yml pull
#   docker compose -f docker-compose.do.yml up -d
#
# OAuth redirect URI in Google Cloud must include:
#   https://staging.braintunnel.ai/api/oauth/google/callback

services:
  brain:
    platform: linux/amd64
    image: registry.digitalocean.com/braintunnel/brain-app:latest
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BRAIN_DATA_ROOT: /brain-data
      RIPMAIL_BIN: /usr/local/bin/ripmail
      PORT: "4000"
      PUBLIC_WEB_ORIGIN: https://staging.braintunnel.ai
    volumes:
      - /brain-data:/brain-data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(\"http://127.0.0.1:\"+(process.env.PORT||\"4000\")+\"/api/vault/status\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
