services:
  brain:
    build: .
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      # Override local paths from .env with container paths
      - NODE_ENV=production
      - PORT=4000
      - WIKI_DIR=/wiki
      - RIPMAIL_BIN=ripmail
      # Must match volume below — ripmail ignores the mount unless RIPMAIL_HOME is set (default is ~/.ripmail)
      - RIPMAIL_HOME=/ripmail
    volumes:
      # ripmail SQLite index + rules (persisted across restarts)
      - ${HOME}/.ripmail:/ripmail
