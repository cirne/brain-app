# Local / staging: Brain in Docker with durable BRAIN_DATA_ROOT in a Docker named volume (not a host path / external drive).
# Usage: copy .env.example → .env, set API keys, then:
#   npm run docker:up
#
# Compose overrides BRAIN_DATA_ROOT (multi-tenant volume root) and PORT (4000 in-container); other vars come from .env.
# OPP-051 Enron demo: pre-seed tenants (see docs/architecture/enron-demo-tenant.md); mint/`/demo` returns 503 until mail exists
# (download + index) when `ripmail.db` is not present — no separate compose service.
# Optional: `EVAL_ENRON_TAR` in `.env` avoids downloading the CMU tarball inside the container.
# Enable demo login with `BRAIN_ENRON_DEMO_SECRET` (any non-empty value) in `.env`.
# Host publish port: BRAIN_DOCKER_PORT (default 4000) → container 4000.
#
# Apple Silicon: optional `BRAIN_DOCKER_PLATFORM=linux/amd64` in `.env` when you need an amd64 engine image.

services:
  brain:
    platform: ${BRAIN_DOCKER_PLATFORM:-}
    build:
      context: .
      dockerfile: Dockerfile
    # Default 4000:4000 keeps Gmail OAuth loopback redirect aligned with in-container PORT.
    ports:
      - "${BRAIN_DOCKER_PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BRAIN_DATA_ROOT: /brain-data
      PORT: "4000"
      NEW_RELIC_APP_NAME: Braintunnel Local Dev
      PUBLIC_WEB_ORIGIN: http://localhost:4000
    volumes:
      - brain_data:/brain-data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(\"http://127.0.0.1:\"+(process.env.PORT||\"4000\")+\"/api/vault/status\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  brain_data:
