# Local / staging: Brain in Docker with durable BRAIN_HOME on a volume.
# Usage: copy .env.example → .env, set API keys, then:
#   npm run docker:up   (prebuilds Linux ripmail on host or via rust:bookworm, then compose --build)
#
# Compose overrides BRAIN_HOME, RIPMAIL_BIN, and PORT (4000 in-container); other vars come from .env.
# Host publish port: BRAIN_DOCKER_PORT (default 4000) → container 4000.

services:
  brain:
    build:
      context: .
      dockerfile: Dockerfile
    # Default 4000:4000 keeps Gmail OAuth loopback redirect aligned with in-container PORT.
    ports:
      - "${BRAIN_DOCKER_PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BRAIN_HOME: /brain
      RIPMAIL_BIN: /usr/local/bin/ripmail
      PORT: "4000"
      # Same host you use in the browser (avoids localhost vs 127.0.0.1 OAuth cookie mismatch).
      # If BRAIN_DOCKER_PORT is not 4000, set explicitly, e.g. http://localhost:8080
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:-http://localhost:4000}
    volumes:
      - brain_home:/brain
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(\"http://127.0.0.1:\"+(process.env.PORT||\"4000\")+\"/api/vault/status\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  brain_home:
