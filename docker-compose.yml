# Local / staging: Brain in Docker with durable BRAIN_DATA_ROOT in a Docker named volume (not a host path / external drive).
# Usage: copy .env.example → .env, set API keys, then:
#   npm run docker:up   (prebuilds Linux ripmail on host or via rust:bookworm, then compose --build)
#
# Compose overrides BRAIN_DATA_ROOT (multi-tenant volume root), RIPMAIL_BIN, and PORT (4000 in-container); other vars come from .env.
# OPP-051 Enron demo: first successful `POST /api/auth/demo/enron` (or `/demo` in the browser) starts a **lazy** background seed
# (download + index) when `ripmail.db` is not present — no separate compose service.
# Optional: `EVAL_ENRON_TAR` in `.env` avoids downloading the CMU tarball inside the container.
# Enable demo login with `BRAIN_ENRON_DEMO_SECRET` (any non-empty value) in `.env`.
# Host publish port: BRAIN_DOCKER_PORT (default 4000) → container 4000.
#
# Ripmail arch must match the container OS/arch. If seed logs show `ripmail not runnable`, run `file .docker/linux-ripmail/ripmail`:
# x86_64 on Apple Silicon often needs `BRAIN_DOCKER_PLATFORM=linux/amd64` in `.env` (or rebuild ripmail for arm64).
# Default Docker engine arch + default prebuild → leave `BRAIN_DOCKER_PLATFORM` unset.

services:
  brain:
    platform: ${BRAIN_DOCKER_PLATFORM:-}
    build:
      context: .
      dockerfile: Dockerfile
    # Default 4000:4000 keeps Gmail OAuth loopback redirect aligned with in-container PORT.
    ports:
      - "${BRAIN_DOCKER_PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BRAIN_DATA_ROOT: /brain-data
      RIPMAIL_BIN: /usr/local/bin/ripmail
      PORT: "4000"
      NEW_RELIC_APP_NAME: Braintunnel Local Dev
      PUBLIC_WEB_ORIGIN: http://localhost:4000
    volumes:
      - brain_data:/brain-data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(\"http://127.0.0.1:\"+(process.env.PORT||\"4000\")+\"/api/vault/status\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  brain_data:
